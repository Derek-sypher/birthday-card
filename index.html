<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Birthday Mystery Card</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#1c1230,#06040a 60%,#000);min-height:100vh;overflow:hidden;color:#fff}
#bg{position:fixed;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,215,0,.08),transparent 40%,rgba(255,105,180,.08));}
.container{position:relative;z-index:2;max-width:430px;margin:0 auto;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{width:100%;background:rgba(14,14,20,.78);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}
.top{padding:18px 18px 12px;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent)}
.title{font-size:1.45rem;color:#ffe29a;text-shadow:0 0 14px rgba(255,226,154,.2)}
.sub{font-size:.86rem;opacity:.8;margin-top:6px}
.stage{position:relative;height:310px;overflow:hidden;background:#09070f}
.slide{position:absolute;inset:0;opacity:0;transform:scale(1.08);transition:opacity .9s ease,transform 1.2s ease}
.slide.active{opacity:1;transform:scale(1)}
.slide img{width:100%;height:100%;object-fit:cover;filter:saturate(1.1) contrast(1.08)}
.overlay{position:absolute;left:0;right:0;bottom:0;padding:18px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.82) 35%,rgba(0,0,0,.94))}
.name{font-size:1.15rem;font-weight:700;color:#fff5d6}
.msg{font-size:.92rem;line-height:1.55;color:#f2f2f2;min-height:70px;margin-top:6px;opacity:0;animation:fadeMsg 2.8s ease forwards}
@keyframes fadeMsg{0%{opacity:0;transform:translateY(8px)}20%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-4px)}}
.controls{display:flex;gap:10px;padding:14px 16px 16px}
.btn{flex:1;border:none;border-radius:16px;padding:14px 12px;font-weight:700;cursor:pointer}.btn.prev{background:linear-gradient(135deg,#ffbfdc,#ff8cc6);color:#241029}.btn.next{background:linear-gradient(135deg,#ffe08a,#fff3c9);color:#251826}.btn.voice{width:100%;background:linear-gradient(135deg,#bfa8ff,#e5d9ff);color:#241029;margin-top:-4px}.btn:active{transform:scale(.98)}
.hint{padding:0 16px 16px;font-size:.82rem;opacity:.78;text-align:center}.hint small{color:#ffe29a}
.sparkle,.heart{position:absolute;pointer-events:none;z-index:3}.sparkle{width:6px;height:6px;border-radius:50%;background:#fff1a8;box-shadow:0 0 12px #fff1a8;animation:float 6s linear infinite}.heart{font-size:18px;animation:rise 5s linear infinite}
@keyframes float{0%{transform:translateY(0) scale(0);opacity:0}20%{opacity:1;transform:scale(1)}100%{transform:translateY(-90vh) scale(.2);opacity:0}}@keyframes rise{0%{transform:translateY(0) rotate(0);opacity:0}15%{opacity:1}100%{transform:translateY(-95vh) rotate(360deg);opacity:0}}
.lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);backdrop-filter:blur(3px);font-size:.98rem;z-index:4}
</style>
</head>
<body>
<div id="bg"></div>
<div class="container">
  <div class="card">
    <div class="top">
      <div class="title">Birthday Mystery Card</div>
      <div class="sub">Swipe or use the buttons. Each reveal unfolds a new secret.</div>
    </div>
    <div class="stage" id="stage">
      <div class="slide active" data-msg="Virginia, your quiet strength and thoughtful spirit make you unforgettable. You carry grace in every step, and your choices speak with wisdom.">
        <img src="virginia.jpg" alt="Virginia">
        <div class="overlay"><div class="name">Virginia</div><div class="msg" id="msg0"></div></div>
      </div>
      <div class="slide" data-msg="Lucy, your warm laugh and lively energy bring light wherever you go. You make ordinary moments feel special, and that is a beautiful gift.">
        <img src="lucy.jpg" alt="Lucy">
        <div class="overlay"><div class="name">Lucy</div><div class="msg" id="msg1"></div></div>
      </div>
      <div class="slide" data-msg="This memory is a treasure. The bond shared here is rare, genuine, and worth celebrating with love, joy, and gratitude.">
        <img src="memory.jpg" alt="Memory">
        <div class="overlay"><div class="name">Shared Memory</div><div class="msg" id="msg2"></div></div>
      </div>
      <div class="lock" id="lock">Tap a button to reveal the next surprise</div>
    </div>
    <div class="controls">
      <button class="btn prev" onclick="prevSlide()">Previous</button>
      <button class="btn next" onclick="nextSlide()">Next</button>
    </div>
    <div class="controls" style="padding-top:0">
      <button class="btn voice" onclick="playVoice()">Play Voice Message</button>
    </div>
    <div class="hint">Replace <small>virginia.jpg</small>, <small>lucy.jpg</small>, <small>memory.jpg</small>, <small>birthday.mp3</small>, and <small>voice.mp3</small> in the same folder.</div>
  </div>
</div>
<audio id="music" loop preload="auto" src="birthday.mp3"></audio>
<audio id="voice" preload="auto" src="voice.mp3"></audio>
<script>
let i = 0;
let started = false;
const slides = [...document.querySelectorAll('.slide')];
const stage = document.getElementById('stage');
const music = document.getElementById('music');
const voice = document.getElementById('voice');
const lock = document.getElementById('lock');

function showMsg(el, txt){
  el.classList.remove('msg');
  void el.offsetWidth;
  el.classList.add('msg');
  el.textContent = txt;
}

function fire(){
  for(let k=0;k<7;k++){
    setTimeout(()=>{
      const s=document.createElement('div');
      s.className='sparkle';
      s.style.left=Math.random()*100+'%';
      s.style.top='100%';
      s.style.animationDuration=(4+Math.random()*4)+'s';
      stage.appendChild(s);
      setTimeout(()=>s.remove(),8000);
    },k*140);

    setTimeout(()=>{
      const h=document.createElement('div');
      h.className='heart';
      h.textContent=['💖','✨','🌹','💛'][Math.floor(Math.random()*4)];
      h.style.left=Math.random()*100+'%';
      h.style.top='95%';
      h.style.animationDuration=(4+Math.random()*3)+'s';
      stage.appendChild(h);
      setTimeout(()=>h.remove(),9000);
    },k*180);
  }
}

function show(n){
  i=(n+slides.length)%slides.length;
  slides.forEach((s,idx)=>s.classList.toggle('active',idx===i));
  const msg=slides[i].dataset.msg;
  const el=document.getElementById('msg'+i);
  showMsg(el, msg);
  lock.style.display='none';
  fire();
}

function nextSlide(){
  if(!started){
    music.play().then(()=>started=true).catch(()=>{});
    started=true;
  }
  show(i+1);
  music.play().catch(()=>{});
}

function prevSlide(){
  if(!started){
    music.play().then(()=>started=true).catch(()=>{});
    started=true;
  }
  show(i-1);
  music.play().catch(()=>{});
}

function playVoice(){
  voice.play().catch(()=>{});
  setTimeout(()=>fire(),600);
}

let startX=0;
stage.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-startX;
  if(Math.abs(dx)>40){
    if(dx<0) nextSlide();
    else prevSlide();
  }
},{passive:true});

window.addEventListener('load',()=>show(0));
</script>
</body>
</html>
